# deployments/docker-compose.yml
# Orquestra todos os serviços de infraestrutura localmente.
# Em produção cada um desses seria um serviço gerenciado (ex: AstraDB, Qdrant Cloud).

services:
  cassandra:
    image: cassandra:4.1
    container_name: kb-cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=knowledge-cluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      # nodetool status retorna 0 quando o node está UP e pronto pra receber conexões
      test: ["CMD", "nodetool", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s  # Cassandra demora pra iniciar, evita falso negativo

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kb-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # Qdrant expõe um endpoint gRPC de health — wget é mais confiável que curl aqui
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: kb-postgres
    ports:
      - "5432:5432"
    environment:
      #POSTGRES_DB cria o banco automaticamente no primeiro boot
      #Em produção, essas credenciais viriam de secrets (Azure Key Vault, etc)
      - POSTGRES_DB=knowledge_base
      - POSTGRES_USER=kb_user
      - POSTGRES_PASSWORD=kb_local_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      #pg_isready verifica se o PostgreSQL esta aceitando conexões
      #Diferente do Cassandra, PostgreSQL sobe em segundos
      test: ["CMD-SHELL", "pg_isready -U kb_user -d knowledge_base"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s


  # Ollama roda fora do compose (instalado direto no host)
  # porque precisa de acesso à GPU se disponível.
  # A aplicação acessa via http://host.docker.internal:11434 ou localhost.

volumes:
  cassandra_data:
    driver: local
  qdrant_data:
    driver: local
  postgres_data:
    driver: local
